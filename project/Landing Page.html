<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yelp AI Solutions — Reduce Review-Scanning Friction</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf9;
    font-family: -apple-system, system-ui, sans-serif;
    color: #111;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .header {
    padding: 60px 0;
    text-align: center;
  }
  .header h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .header p {
    font-size: 18px;
    color: #666;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    padding: 40px 0 80px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    border: 1px solid #ebebeb;
    transition: all 0.2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: #d32323;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .card-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 28px;
  }
  .card-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .card-value {
    font-size: 14px;
    color: #d32323;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .card-summary {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 20px;
    flex: 1;
  }
  .card-pros-cons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .card-pros, .card-cons {
    padding: 12px;
    border-radius: 10px;
  }
  .card-pros {
    background: #f0f9f5;
  }
  .card-pros-label {
    font-weight: 600;
    color: #2d8f5e;
    margin-bottom: 6px;
  }
  .card-pros-text {
    color: #333;
    line-height: 1.5;
  }
  .card-cons {
    background: #fdf5f5;
  }
  .card-cons-label {
    font-weight: 600;
    color: #d32323;
    margin-bottom: 6px;
  }
  .card-cons-text {
    color: #333;
    line-height: 1.5;
  }
  .btn-primary {
    background: #d32323;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-primary:hover {
    background: #b71919;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
  }
  .modal-content {
    background: #fff;
    border-radius: 24px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow: auto;
    position: relative;
  }
  .modal-header {
    padding: 24px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #666;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body {
    padding: 32px 24px;
    text-align: center;
  }
  .modal-body p {
    font-size: 16px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .exit-button {
    background: #f5f5f5;
    color: #111;
    border: 1px solid #e0e0e0;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .exit-button:hover {
    background: #e8e8e8;
  }
  @media (max-width: 1024px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .header h1 {
      font-size: 32px;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const SOLUTIONS = [
  {
    id: 'vibe-gallery',
    icon: '🎨',
    title: 'Visual Vibe Gallery',
    value: 'Photo clusters organized by experiential Moments',
    summary: 'Transforms a flat photo dump into a social-proof-driven visual walkthrough. Photos organized by context ("Saturday Night Vibe," "The Patio at Sunset") with reaction counts, reviewer credibility signals, and optional short-form video.',
    pros: 'Immersive discovery, social proof at a glance',
    cons: 'Requires video moderation',
  },
  {
    id: 'dietary-intel',
    icon: '🍽️',
    title: 'Dietary Intelligence',
    value: 'Personalized recommendations based on your diet',
    summary: 'Automatically infers your dietary profile and shows relevant dishes with photos, review-extracted safety signals, and a "people like you ordered" carousel. Answers "can I eat here and what should I get?" without reading a single review.',
    pros: 'Instant confidence, zero friction',
    cons: 'Privacy considerations with profiling',
  },
  {
    id: 'persona-reviews',
    icon: '⭐',
    title: 'Persona-Based Review Highlights',
    value: 'Reviews auto-sorted by what matters to you',
    summary: 'Reorders review excerpts and insights based on implicit behavioral signals (search history, past reviews, bookmarks). A parent sees kid-friendliness first; a foodie sees ingredient sourcing — same page, personalized for each user, no setup.',
    pros: 'Truly personalized, transparent signals',
    cons: 'Complex algorithm, interpretation risks',
  },
];

function LandingPage() {
  const [selectedSolution, setSelectedSolution] = React.useState(null);

  const handleTryPrototype = (solutionId) => {
    setSelectedSolution(solutionId);
  };

  const handleExit = () => {
    setSelectedSolution(null);
  };

  return (
    <>
      <div className="container">
        <div className="header">
          <h1>AI Solutions for Yelp</h1>
          <p>Three concepts to reduce review-scanning friction and help users make confident decisions faster.</p>
        </div>
        <div className="grid">
          {SOLUTIONS.map(solution => (
            <div key={solution.id} className="card">
              <div className="card-icon">{solution.icon}</div>
              <div className="card-title">{solution.title}</div>
              <div className="card-value">{solution.value}</div>
              <div className="card-summary">{solution.summary}</div>
              <div className="card-pros-cons">
                <div className="card-pros">
                  <div className="card-pros-label">✓ Pros</div>
                  <div className="card-pros-text">{solution.pros}</div>
                </div>
                <div className="card-cons">
                  <div className="card-cons-label">⚠ Cons</div>
                  <div className="card-cons-text">{solution.cons}</div>
                </div>
              </div>
              <button className="btn-primary" onClick={() => handleTryPrototype(solution.id)}>
                Try This Prototype
              </button>
            </div>
          ))}
        </div>
      </div>

      {selectedSolution && (
        <div className="modal-overlay" onClick={handleExit}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">
                {SOLUTIONS.find(s => s.id === selectedSolution)?.title}
              </div>
              <button className="modal-close" onClick={handleExit}>×</button>
            </div>
            <div className="modal-body">
              <p style={{ fontSize: '18px', fontWeight: 600, color: '#111', marginBottom: 32 }}>
                🚧 Prototype Coming Soon
              </p>
              <p>
                This prototype variant is under development. Click below to exit and explore the main Ceibo business page prototype.
              </p>
              <button className="exit-button" onClick={handleExit}>
                Exit Prototype
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LandingPage/>);
</script>
</body>
</html>
